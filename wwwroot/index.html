<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Hello</title>
  <style>
  body {
    min-height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f7f7fa;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 10px rgba(80,90,110,0.07);
    padding: 30px 24px;
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  label {
    font-weight: 600;
    font-size: 16px;
  }
  input[type="text"] {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #d3d6e1;
    font-size: 15px;
    width: 100%;
    box-sizing: border-box;
  }
  button {
    background: #5e72e4;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 9px 0;
    width: 100%;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover {
    background: #4a5fd2;
  }
  #sonuc {
    min-height: 22px;
    color: #364fc7;
    font-size: 20px;
    text-align: center;
    font-weight: 500;
  }
</style>

</head>
<body>
    <div class="container">
    <label for="isim">İsim:</label>
    <input type="text" id="isim" placeholder="">
    <button onclick="verileriGetir()">Mesajı Göster</button>
    <div id="sonuc"></div>
    </div>
<script>
    async function verileriGetir() {
        const isim = document.getElementById("isim").value.trim();
try{
const helloRes = await fetch(`http://localhost:52369/api/Hello?YourName=${isim}`);
        const helloData = await helloRes.json();
        sonuc.innerHTML = helloData;
}
catch (err){
sonuc.innerHTML = "hata";
        console.error(err);
}}
</script>
</body>
